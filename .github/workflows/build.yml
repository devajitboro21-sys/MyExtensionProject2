name: Build Extension
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
      
      - name: Setup Java 1.8
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '8' # In GitHub Actions, '8' is the command for 1.8

      - name: Build AIX
        uses: pavi2410/AIX-Action@v2
        with:
          name: abajaba

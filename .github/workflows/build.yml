name: Build AIX Extension

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Install Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Download App Inventor Tools
        run: |
          git clone https://github.com/mit-cml/appinventor-sources.git

      - name: Compile Extension
        run: |
          mkdir build
          javac -cp appinventor-sources/appinventor/components/build/classes -d build src/dev/Dev.java

      - name: Create AIX
        run: |
          cd build
          zip -r Dev.aix *

      - name: Upload Extension
        uses: actions/upload-artifact@v3
        with:
          name: Dev-extension
          path: build/Dev.aix

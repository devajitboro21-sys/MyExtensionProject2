name: Build Extension
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build AIX
        uses: pavi2410/AIX-Action@main
        with:

          name: aaa
          source-dir: src

      - name: Upload AIX
        uses: actions/upload-artifact@v4
        with:
          name: abajaba-extension
          path: out/*.aix

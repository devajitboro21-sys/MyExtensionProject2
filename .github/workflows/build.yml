name: Build MIT App Inventor Extension

on:
  push:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 11

      - name: Install Android SDK
        run: |
          sudo apt-get update
          sudo apt-get install -y android-sdk

      - name: Download App Inventor sources
        run: |
          git clone https://github.com/mit-cml/appinventor-sources.git

      - name: Build components
        run: |
          cd appinventor-sources/appinventor
          ant MakeExtensions

      - name: Compile extension
        run: |
          mkdir build
          javac -cp "appinventor-sources/appinventor/buildserver/build/classes:/usr/lib/android-sdk/platforms/android-30/android.jar" -d build src/dev/Dev.java

      - name: Package extension
        run: |
          cd build
          zip -r Dev.aix *

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Dev-extension
          path: build/Dev.aix

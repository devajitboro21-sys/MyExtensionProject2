name: Build AIX Extension

on:
  push:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 11

      - name: Download App Inventor Extension Tools
        run: |
          wget https://github.com/mit-cml/appinventor-sources/archive/refs/heads/master.zip
          unzip master.zip

      - name: Compile Extension
        run: |
          mkdir build
          javac -cp appinventor-sources-master/appinventor/components/build/classes -d build src/dev/Dev.java

      - name: Create AIX File
        run: |
          cd build
          zip -r Dev.aix *

      - name: Upload Extension
        uses: actions/upload-artifact@v4
        with:
          name: Dev-extension
          path: build/Dev.aix
